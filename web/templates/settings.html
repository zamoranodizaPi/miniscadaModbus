{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-3">Configuración</h1>
<form method="post" class="row g-3">
  <div class="col-md-4">
    <label class="form-label">Intervalo por defecto</label>
    <input class="form-control" name="default_poll_interval" type="number" value="{{ values.get('default_poll_interval', '10') }}" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Recarga daemon</label>
    <input class="form-control" name="daemon_reload_interval" type="number" value="{{ values.get('daemon_reload_interval', '5') }}" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Color scheme dashboard</label>
    <select class="form-select" name="dashboard_theme">
      {% for theme in ['orange', 'blue', 'green', 'black', 'gray'] %}
      <option value="{{ theme }}" {% if dashboard_preferences.theme == theme %}selected{% endif %}>{{ theme|capitalize }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Modo dashboard</label>
    <select class="form-select" name="dashboard_mode">
      {% for mode in ['dark', 'light'] %}
      <option value="{{ mode }}" {% if dashboard_preferences.mode == mode %}selected{% endif %}>{{ mode|capitalize }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Language dashboard</label>
    <select class="form-select" name="dashboard_language">
      {% for language in ['en', 'es'] %}
      <option value="{{ language }}" {% if dashboard_preferences.language == language %}selected{% endif %}>{{ 'English' if language == 'en' else 'Espanol' }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Panel title suffix</label>
    <input class="form-control" name="title_suffix" type="text" value="{{ dashboard_preferences.get('title_suffix', '') }}" placeholder="Tablero de bombas">
  </div>
  <div class="col-md-4">
    <label class="form-label">Refresh dashboard</label>
    <select class="form-select" name="dashboard_refresh_seconds">
      {% for seconds in [5, 10, 15] %}
      <option value="{{ seconds }}" {% if dashboard_preferences.refresh_seconds == seconds %}selected{% endif %}>{{ seconds }} s</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Color scheme kiosk</label>
    <select class="form-select" name="kiosk_theme">
      {% for theme in ['orange', 'blue', 'green', 'black', 'gray'] %}
      <option value="{{ theme }}" {% if dashboard_preferences.kiosk_theme == theme %}selected{% endif %}>{{ theme|capitalize }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Modo kiosk</label>
    <select class="form-select" name="kiosk_mode">
      {% for mode in ['dark', 'light'] %}
      <option value="{{ mode }}" {% if dashboard_preferences.kiosk_mode == mode %}selected{% endif %}>{{ mode|capitalize }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Language kiosk</label>
    <select class="form-select" name="kiosk_language">
      {% for language in ['en', 'es'] %}
      <option value="{{ language }}" {% if dashboard_preferences.kiosk_language == language %}selected{% endif %}>{{ 'English' if language == 'en' else 'Espanol' }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Nueva contraseña</label>
    <input class="form-control" name="new_password" type="password">
  </div>
  <div class="col-12">
    <div class="panel-card">
      <div class="panel-head">
        <div>
          <p class="panel-kicker mb-2">Web Charts</p>
          <h2 class="panel-title mb-0">Signal Grid Configuration</h2>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-striped align-middle mb-0">
          <thead>
            <tr>
              <th>Visible</th>
              <th>Variable</th>
              <th>Graph Type</th>
              <th>Order</th>
            </tr>
          </thead>
          <tbody>
            {% for chart in chart_variables %}
            <tr>
              <td>
                <input class="form-check-input" type="checkbox" name="chart_enabled__{{ chart.name }}" {% if chart.enabled %}checked{% endif %}>
              </td>
              <td>{{ chart.name }}</td>
              <td>
                <select class="form-select" name="chart_type__{{ chart.name }}">
                  {% for chart_type in ['line', 'bar'] %}
                  <option value="{{ chart_type }}" {% if chart.chart_type == chart_type %}selected{% endif %}>{{ 'Trend' if chart_type == 'line' else 'Bars' }}</option>
                  {% endfor %}
                </select>
              </td>
              <td>
                <input class="form-control" type="number" min="1" name="chart_order__{{ chart.name }}" value="{{ chart.order }}">
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Guardar</button>
  </div>
</form>
{% endblock %}
